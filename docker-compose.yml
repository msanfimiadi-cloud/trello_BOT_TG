services:
  bot:
    build: .
    env_file: .env
    restart: unless-stopped
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('/app/data/bot.sqlite3').execute('SELECT 1')"]
      interval: 30s
      timeout: 5s
      retries: 3
volumes:
  bot-data:
